name: Release

# Tag 触发 PyPI 发布,走 Trusted Publishing (OIDC),无需 API token。
#
# 发版流程:
#   1. pyproject.toml bump version
#   2. git commit + push 到 master
#   3. git tag v<version> && git push --tags   ← 触发本 workflow
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Job 1: macOS 上编译 launcher + 构建 wheel ──────────────
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Verify tag matches pyproject version
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VER" ]; then
            echo "::error::git tag v$TAG 与 pyproject.toml version $VER 不一致,拒绝发布"
            exit 1
          fi
          echo "Tag v$TAG 匹配 pyproject.toml version $VER,继续"

      - name: Build macOS launcher + icon
        run: bash launcher/macos/build.sh

      - name: Build wheel + sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Job 2: Linux 上发布到 PyPI + 创建 GitHub Release ───────
  publish:
    needs: build
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing 的 OIDC
      contents: write    # 创建 GitHub Release
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
