<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="settings.title">Whisper Input 设置</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e0e0e0;
    --primary: #e95420;
    --primary-hover: #c7431a;
    --text: #333333;
    --text-secondary: #666666;
    --success: #4caf50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Ubuntu', 'Noto Sans CJK SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0;
  }
  .header {
    background: var(--primary);
    color: white;
    padding: 24px 32px;
  }
  .header h1 { font-size: 22px; font-weight: 500; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .container {
    max-width: 600px;
    margin: 24px auto;
    padding: 0 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 20px 8px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }
  .setting-row:first-child { border-top: none; }
  .setting-label {
    font-size: 15px;
    flex-shrink: 0;
    margin-right: 16px;
  }
  .setting-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  select {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: white;
    min-width: 180px;
    cursor: pointer;
  }
  select:focus {
    outline: none;
    border-color: var(--primary);
  }
  /* Toggle switch */
  .switch {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc;
    border-radius: 24px;
    transition: 0.2s;
  }
  .slider:before {
    content: "";
    position: absolute;
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .switch input:checked + .slider { background: var(--primary); }
  .switch input:checked + .slider:before { transform: translateX(20px); }
  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 8px;
    margin-bottom: 24px;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-secondary {
    background: white;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #f5f5f5; }
  .btn-danger {
    background: white;
    color: #d32f2f;
    border: 1px solid var(--border);
  }
  .btn-danger:hover { background: #fef2f2; }
  .notice {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: #f9f9f9;
    border-radius: 0 0 8px 8px;
  }
  .footer {
    text-align: center;
    padding: 8px 16px 24px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .footer a {
    color: var(--text-secondary);
    text-decoration: none;
  }
  .footer a:hover {
    color: var(--primary);
    text-decoration: underline;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="header">
  <h1 data-i18n="settings.title">Whisper Input 设置</h1>
  <p data-i18n="settings.subtitle">语音输入工具 - 按住快捷键说话，松开自动输入</p>
</div>
<div class="container">
  <div class="card">
    <div class="card-title" data-i18n="settings.basic">基本设置</div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.sound">提示音</div>
        <div class="setting-desc" data-i18n="settings.sound_desc">录音开始和结束时播放提示音</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="sound_enabled">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.overlay">录音浮窗</div>
        <div class="setting-desc" data-i18n="settings.overlay_desc">录音时在屏幕上显示状态浮窗</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="overlay_enabled">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.tray_status">托盘图标状态</div>
        <div class="setting-desc" data-i18n="settings.tray_status_desc">托盘图标颜色随录音/识别状态变化</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="tray_status_enabled">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.language">界面语言</div>
        <div class="setting-desc" data-i18n="settings.language_desc">切换界面显示语言</div>
      </div>
      <select id="ui_language">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="settings.advanced">高级设置</div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.hotkey">快捷键</div>
        <div class="setting-desc" data-i18n="settings.hotkey_desc">按住此键开始录音</div>
      </div>
      <select id="hotkey"></select>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.port">页面端口</div>
        <div class="setting-desc" data-i18n="settings.port_desc">浏览器访问页面的端口号</div>
      </div>
      <input type="number" id="settings_port" min="1024" max="65535"
        style="width:100px; padding:6px 12px; border:1px solid var(--border);
        border-radius:6px; font-size:14px;">
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="settings.autostart">开机自动启动</div>
        <div class="setting-desc" data-i18n="settings.autostart_desc">登录后自动运行 Whisper Input</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="autostart">
        <span class="slider"></span>
      </label>
    </div>
    <div class="notice" data-i18n="settings.restart_notice">
      修改快捷键或端口后需要重启程序才能生效
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-danger" onclick="quitApp()" data-i18n="settings.quit">退出程序</button>
    <button class="btn btn-secondary" onclick="restartApp()" data-i18n="settings.restart">重启程序</button>
    <div style="flex:1"></div>
    <button class="btn btn-secondary" onclick="resetConfig()" data-i18n="settings.reset">
      恢复默认设置
    </button>
  </div>
  <div class="footer">
    v$version $commit &middot;
    <a href="https://github.com/pkulijing/whisper-input" target="_blank">
      GitHub
    </a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const HOTKEY_CODES = $hotkey_codes;
const HOTKEY_KEY = '$hotkey_key';
const HOTKEY_DEFAULT = '$hotkey_default';
const LOCALES = $locale_data;
let currentLang = '$current_language';

// --- i18n ---

function i18n(key) {
  return (LOCALES[currentLang] || {})[key]
    || (LOCALES['zh'] || {})[key]
    || key;
}

function applyLocale(lang) {
  currentLang = lang;
  // 替换所有 data-i18n 元素
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    var text = i18n(key);
    if (el.tagName === 'TITLE') {
      document.title = text;
    }
    el.textContent = text;
  });
  // 重建热键下拉（标签需要翻译）
  var sel = document.getElementById('hotkey');
  var curVal = sel.value;
  sel.innerHTML = '';
  HOTKEY_CODES.forEach(function(code) {
    var opt = document.createElement('option');
    opt.value = code;
    opt.textContent = i18n('hotkey.' + code);
    if (code === curVal) opt.selected = true;
    sel.appendChild(opt);
  });
  // 同步语言下拉选中状态
  document.getElementById('ui_language').value = lang;
}

// --- Toast ---

function showToast(msg, duration) {
  duration = duration || 2000;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, duration);
}

// --- API ---

async function loadConfig() {
  try {
    var [cfgRes, autoRes] = await Promise.all([
      fetch('/api/config'),
      fetch('/api/autostart')
    ]);
    var config = await cfgRes.json();
    var autostart = await autoRes.json();

    // 初始化热键下拉
    var sel = document.getElementById('hotkey');
    sel.innerHTML = '';
    HOTKEY_CODES.forEach(function(code) {
      var opt = document.createElement('option');
      opt.value = code;
      opt.textContent = i18n('hotkey.' + code);
      var selected = config[HOTKEY_KEY] || HOTKEY_DEFAULT;
      if (code === selected) opt.selected = true;
      sel.appendChild(opt);
    });

    document.getElementById('sound_enabled').checked =
      config.sound ? config.sound.enabled !== false : true;
    document.getElementById('overlay_enabled').checked =
      config.overlay ? config.overlay.enabled !== false : true;
    document.getElementById('tray_status_enabled').checked =
      config.tray_status ? config.tray_status.enabled !== false : true;
    document.getElementById('settings_port').value =
      config.settings_port || 51230;
    document.getElementById('autostart').checked =
      autostart.enabled || false;

    // 从配置同步语言
    var cfgLang = config.ui && config.ui.language ? config.ui.language : 'zh';
    document.getElementById('ui_language').value = cfgLang;
    if (cfgLang !== currentLang) {
      applyLocale(cfgLang);
    }
  } catch (e) {
    showToast(i18n('settings.load_failed').replace('{error}', e.message), 3000);
  }
}

var RESTART_KEYS = [HOTKEY_KEY, 'settings_port'];

async function saveSetting(key, value) {
  try {
    var res = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({[key]: value})
    });
    if (res.ok) {
      showToast(i18n('settings.saved'), 1200);
      if (RESTART_KEYS.includes(key)) {
        setTimeout(function() {
          if (confirm(i18n('settings.confirm_restart'))) {
            restartApp();
          }
        }, 300);
      }
    } else {
      showToast(i18n('settings.save_failed'), 3000);
    }
  } catch (e) {
    showToast(i18n('settings.save_failed') + ': ' + e.message, 3000);
  }
}

async function saveAutostart(enabled) {
  try {
    await fetch('/api/autostart', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({enabled: enabled})
    });
    showToast(i18n('settings.saved'), 1200);
  } catch (e) {
    showToast(i18n('settings.save_failed') + ': ' + e.message, 3000);
  }
}

async function resetConfig() {
  if (!confirm(i18n('settings.confirm_reset'))) return;
  try {
    var res = await fetch('/api/config/reset', {method: 'POST'});
    if (res.ok) {
      showToast(i18n('settings.reset_done'));
      // 恢复默认语言
      currentLang = 'zh';
      applyLocale(currentLang);
      loadConfig();
    } else {
      showToast(i18n('settings.reset_failed'), 3000);
    }
  } catch (e) {
    showToast(i18n('settings.reset_failed') + ': ' + e.message, 3000);
  }
}

async function quitApp() {
  if (!confirm(i18n('settings.confirm_quit'))) return;
  try {
    await fetch('/api/quit', {method: 'POST'});
  } catch (e) {
    // 连接断开是正常的（程序已退出）
  }
  showToast(i18n('settings.quit_done'));
}

async function restartApp() {
  showToast(i18n('settings.restarting'));
  try {
    await fetch('/api/restart', {method: 'POST'});
  } catch (e) {
    // 连接断开是正常的（程序正在重启）
  }
  // 等待新进程启动后刷新页面
  setTimeout(function() { location.reload(); }, 3000);
}

// 绑定控件变化事件，自动保存
function bindAutoSave() {
  document.getElementById('hotkey').addEventListener('change', function() {
    saveSetting(HOTKEY_KEY, this.value);
  });
  document.getElementById('sound_enabled').addEventListener('change', function() {
    saveSetting('sound.enabled', this.checked);
  });
  document.getElementById('overlay_enabled').addEventListener('change', function() {
    saveSetting('overlay.enabled', this.checked);
  });
  document.getElementById('tray_status_enabled').addEventListener('change', function() {
    saveSetting('tray_status.enabled', this.checked);
  });
  document.getElementById('settings_port').addEventListener('change', function() {
    var port = parseInt(this.value);
    if (port >= 1024 && port <= 65535) {
      saveSetting('settings_port', port);
    } else {
      showToast(i18n('settings.port_range'), 3000);
    }
  });
  document.getElementById('autostart').addEventListener('change', function() {
    saveAutostart(this.checked);
  });
  // 语言切换
  document.getElementById('ui_language').addEventListener('change', function() {
    applyLocale(this.value);
    saveSetting('ui.language', this.value);
  });
}

// 页面加载时初始化
applyLocale(currentLang);
loadConfig().then(bindAutoSave);
</script>
</body>
</html>
