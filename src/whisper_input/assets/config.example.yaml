# Whisper Input - 语音输入配置

# STT 引擎
engine: qwen3

# 快捷键配置（按平台分别设置）
# Linux 可选: KEY_RIGHTCTRL, KEY_LEFTCTRL, KEY_RIGHTALT, KEY_LEFTALT,
#             KEY_RIGHTMETA, KEY_LEFTMETA, KEY_CAPSLOCK, KEY_F1-F12
hotkey_linux: KEY_RIGHTCTRL
# macOS 可选: KEY_RIGHTMETA, KEY_LEFTMETA (Command), KEY_RIGHTCTRL, KEY_LEFTCTRL,
#             KEY_RIGHTALT, KEY_LEFTALT (Option), KEY_CAPSLOCK, KEY_F1/F2/F5/F12
hotkey_macos: KEY_RIGHTMETA

# 音频配置
audio:
  sample_rate: 16000
  channels: 1

# Qwen3-ASR 本地模型配置
# 首次启动通过 modelscope.snapshot_download 从 ModelScope 下载,缓存在
# ~/.cache/modelscope/hub/,国内 CDN 直连,之后永久离线。
# variant: 0.6B (~990MB 下载 / ~1.5GB 内存,默认) 或
#          1.7B (~2.4GB 下载 / ~3GB 内存,识别更准)
qwen3:
  variant: "0.6B"
  # 流式识别:按住热键说话时边说边出字(28 轮)。关闭则松手后一次性粘贴
  streaming_mode: true

# 提示音（按平台分别设置路径）
sound:
  enabled: false
  start_linux: /usr/share/sounds/freedesktop/stereo/message.oga
  stop_linux: /usr/share/sounds/freedesktop/stereo/complete.oga
  start_macos: /System/Library/Sounds/Tink.aiff
  stop_macos: /System/Library/Sounds/Pop.aiff

# 设置页面端口
settings_port: 51230

# 更新检查（启动时查询 PyPI 是否有新版本）
update:
  check_enabled: true

# 日志级别：DEBUG / INFO / WARNING / ERROR
# 日志目录：macOS ~/Library/Logs/Whisper Input/、
#          Linux $XDG_STATE_HOME/whisper-input/（兜底 ~/.local/state/whisper-input/）
log_level: INFO
