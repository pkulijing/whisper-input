# Whisper Input - 语音输入配置

# STT 引擎
engine: sensevoice

# 快捷键配置
# 可选值: KEY_RIGHTCTRL, KEY_LEFTCTRL, KEY_RIGHTALT, KEY_LEFTALT,
#         KEY_RIGHTMETA, KEY_LEFTMETA (Command), KEY_CAPSLOCK, KEY_F1/F2/F5/F12
hotkey: KEY_LEFTCTRL

# 音频配置
audio:
  sample_rate: 16000
  channels: 1

# SenseVoice 本地模型配置
sensevoice:
  model: iic/SenseVoiceSmall
  device: cuda   # mps, cpu
  language: auto  # auto, zh, en, ja, ko, yue

# 输入方式: "clipboard" (剪贴板 + Cmd+V)
input_method: clipboard

# 提示音
sound:
  enabled: false
  start: /usr/share/sounds/freedesktop/stereo/message.oga
  stop: /usr/share/sounds/freedesktop/stereo/complete.oga

# 设置页面端口
settings_port: 51230
