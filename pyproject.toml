[project]
name = "whisper-input"
version = "0.4.0"
description = "语音输入工具 - 按住快捷键说话，松开自动输入"
readme = "README.md"
requires-python = ">=3.12.13,<3.13"
dependencies = [
    "sounddevice>=0.4.6",
    "numpy>=1.24.0",
    "pyyaml>=6.0",
    "pystray>=0.19.0",
    "pillow>=10.0.0",
    # sherpa-onnx wheel 已静态打包 onnxruntime,不依赖 pip 上的 onnxruntime。
    # 唯一 Python 依赖是 numpy,所以整个 uv sync 过程不会触碰 pypi.org。
    # 这次迁移把 torch/torchaudio/funasr 和 cuda/cpu 双 extras 都干掉了,
    # 国内首装体验从"可能卡 40 分钟"变成"几十秒完成"。
    # Linux 专用
    "evdev>=1.7.0; sys_platform == 'linux'",
    "pygobject>=3.56.2; sys_platform == 'linux'",
    # macOS 专用
    "pynput>=1.7.6; sys_platform == 'darwin'",
    "onnxruntime>=1.24.4",
    "kaldi-native-fbank>=1.22.3",
    "soundfile>=0.13.1",
    "sentencepiece>=0.2.1",
]

[project.scripts]
whisper-input = "whisper_input.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/whisper_input"]

[[tool.uv.index]]
name = "tuna"
url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"
default = true

[tool.ruff]
line-length = 80

[tool.ruff.lint]
extend-select = [
    "I",      # isort - import 排序
    "N",      # pep8-naming - 命名规范
    "UP",     # pyupgrade - 使用新语法
    "B",      # flake8-bugbear - 常见 bug
    "SIM",    # flake8-simplify - 可简化的代码
    "RUF",    # ruff 专有规则
]
ignore = [
    "RUF001",  # 字符串中的全角字符（中文项目正常）
    "RUF002",  # docstring 中的全角字符
    "RUF003",  # 注释中的全角字符
]

[dependency-groups]
dev = [
    "ruff>=0.15.9",
]
